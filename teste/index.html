<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste - Extensão CRM</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            padding: 32px;
            max-width: 500px;
            width: 100%;
        }

        h1 {
            font-size: 1.5rem;
            color: #333;
            margin-bottom: 16px;
        }

        p {
            color: #666;
            line-height: 1.6;
            margin-bottom: 12px;
        }

        .status {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 999px;
            font-size: 0.85rem;
            font-weight: 500;
        }

        .status.ok {
            background: #d4edda;
            color: #155724;
        }

        button {
            margin-top: 16px;
            padding: 10px 20px;
            background: #2563eb;
            color: #fff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: background 0.2s;
        }

        button:hover {
            background: #1d4ed8;
        }

        /* ===== WhatsApp Floating Bubble ===== */

        .whatsapp-float {
            position: fixed;
            bottom: 28px;
            right: 28px;
            z-index: 9999;
        }

        /* Pulse ring behind the button */
        .whatsapp-float::before,
        .whatsapp-float::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: rgba(37, 211, 102, 0.3);
            animation: pulse-ring 2s ease-out infinite;
        }

        .whatsapp-float::after {
            animation-delay: 0.6s;
        }

        @keyframes pulse-ring {
            0% {
                width: 60px;
                height: 60px;
                opacity: 0.6;
            }
            100% {
                width: 120px;
                height: 120px;
                opacity: 0;
            }
        }

        .whatsapp-btn {
            position: relative;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: #25D366;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow:
                0 4px 12px rgba(37, 211, 102, 0.4),
                0 0 0 0 rgba(37, 211, 102, 0.4);
            cursor: pointer;
            text-decoration: none;
            animation: float 3s ease-in-out infinite;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .whatsapp-btn:hover {
            transform: scale(1.1);
            box-shadow:
                0 6px 20px rgba(37, 211, 102, 0.5),
                0 0 20px rgba(37, 211, 102, 0.2);
        }

        .whatsapp-btn svg {
            width: 32px;
            height: 32px;
            fill: #fff;
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-10px);
            }
        }

        /* Notification badge */
        .whatsapp-badge {
            position: absolute;
            top: -2px;
            right: -2px;
            width: 20px;
            height: 20px;
            background: #ff3b3b;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: 700;
            color: #fff;
            border: 2px solid #fff;
            animation: bounce-in 0.6s ease 1s both;
        }

        @keyframes bounce-in {
            0% {
                transform: scale(0);
            }
            50% {
                transform: scale(1.3);
            }
            100% {
                transform: scale(1);
            }
        }

        /* Chat balloon popup */
        .whatsapp-popup {
            position: absolute;
            bottom: 75px;
            right: 0;
            width: 320px;
            background: #fff;
            border-radius: 16px;
            box-shadow:
                0 8px 30px rgba(0, 0, 0, 0.15),
                0 2px 8px rgba(0, 0, 0, 0.08);
            overflow: hidden;
            opacity: 0;
            transform: translateY(20px) scale(0.9);
            transform-origin: bottom right;
            transition: all 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
            pointer-events: none;
        }

        .whatsapp-popup.active {
            opacity: 1;
            transform: translateY(0) scale(1);
            pointer-events: auto;
        }

        /* Header */
        .popup-header {
            background: linear-gradient(135deg, #075e54, #128c7e);
            color: #fff;
            padding: 18px 20px;
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .popup-avatar {
            width: 46px;
            height: 46px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .popup-avatar svg {
            width: 26px;
            height: 26px;
            fill: #fff;
        }

        .popup-info h3 {
            font-size: 0.95rem;
            font-weight: 600;
            margin-bottom: 2px;
        }

        .popup-info span {
            font-size: 0.75rem;
            opacity: 0.85;
        }

        .popup-close {
            margin-left: auto;
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.8);
            cursor: pointer;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            transition: background 0.2s;
            font-size: 18px;
        }

        .popup-close:hover {
            background: rgba(255, 255, 255, 0.15);
            color: #fff;
        }

        /* Chat body */
        .popup-body {
            background: #e5ddd5 url("data:image/svg+xml,%3Csvg width='6' height='6' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M0 0h2v2H0zm4 4h2v2H4z' fill='%23d1cfc8' fill-opacity='0.15'/%3E%3C/svg%3E");
            padding: 16px;
            min-height: 140px;
        }

        .chat-msg {
            background: #fff;
            border-radius: 8px 8px 8px 0;
            padding: 10px 14px;
            max-width: 88%;
            box-shadow: 0 1px 1px rgba(0, 0, 0, 0.08);
            position: relative;
            animation: msg-in 0.5s ease 0.3s both;
        }

        .chat-msg::before {
            content: '';
            position: absolute;
            bottom: 0;
            left: -8px;
            width: 0;
            height: 0;
            border-style: solid;
            border-width: 0 0 8px 8px;
            border-color: transparent transparent #fff transparent;
        }

        .chat-msg p {
            color: #333;
            font-size: 0.85rem;
            margin-bottom: 4px !important;
        }

        .chat-msg time {
            font-size: 0.65rem;
            color: #999;
            text-align: right;
            display: block;
        }

        @keyframes msg-in {
            from {
                opacity: 0;
                transform: translateY(8px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        /* Footer */
        .popup-footer {
            padding: 14px 20px;
            background: #f0f0f0;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .popup-footer p {
            margin: 0 !important;
            font-size: 0.8rem;
            color: #555;
            flex: 1;
        }

        .whatsapp-cta {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 10px 20px;
            background: #25D366;
            color: #fff;
            border-radius: 24px;
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 600;
            transition: background 0.2s, transform 0.2s;
            white-space: nowrap;
        }

        .whatsapp-cta:hover {
            background: #1ebe5d;
            transform: scale(1.05);
        }

        .whatsapp-cta svg {
            width: 16px;
            height: 16px;
            fill: #fff;
        }

        /* Typing indicator */
        .typing-dots {
            display: flex;
            gap: 3px;
            padding: 8px 0 0;
        }

        .typing-dots span {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: #9ca3af;
            animation: typing 1.4s infinite;
        }

        .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
        .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typing {
            0%, 60%, 100% {
                transform: translateY(0);
                opacity: 0.4;
            }
            30% {
                transform: translateY(-4px);
                opacity: 1;
            }
        }

        /* Sparkle particles */
        .sparkles {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            pointer-events: none;
        }

        .sparkle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: #25D366;
            border-radius: 50%;
            opacity: 0;
        }

        .whatsapp-btn:hover .sparkle {
            animation: sparkle-fly 0.8s ease forwards;
        }

        .sparkle:nth-child(1) { top: -6px; left: 10px; animation-delay: 0s; }
        .sparkle:nth-child(2) { top: 5px; right: -8px; animation-delay: 0.1s; }
        .sparkle:nth-child(3) { bottom: -4px; left: 20px; animation-delay: 0.2s; }
        .sparkle:nth-child(4) { top: 10px; left: -6px; animation-delay: 0.15s; }
        .sparkle:nth-child(5) { top: -2px; right: 5px; animation-delay: 0.25s; }

        @keyframes sparkle-fly {
            0% {
                opacity: 1;
                transform: scale(1) translate(0, 0);
            }
            100% {
                opacity: 0;
                transform: scale(0) translate(var(--tx, 15px), var(--ty, -20px));
            }
        }

        .sparkle:nth-child(1) { --tx: 20px; --ty: -25px; }
        .sparkle:nth-child(2) { --tx: -15px; --ty: -20px; }
        .sparkle:nth-child(3) { --tx: 10px; --ty: 20px; }
        .sparkle:nth-child(4) { --tx: 25px; --ty: -10px; }
        .sparkle:nth-child(5) { --tx: -20px; --ty: 15px; }

        /* Ensure button children don't block clicks */
        .whatsapp-btn > * {
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Teste da Extensão CRM</h1>
        <p>Página de teste para validação de componentes e funcionalidades.</p>
        <p>Status: <span class="status ok">Funcionando</span></p>
        <button onclick="alert('OK!')">Testar Interação</button>
    </div>

    <!-- WhatsApp Floating Bubble -->
    <div class="whatsapp-float">
        <div class="whatsapp-popup" id="whatsappPopup">
            <div class="popup-header">
                <div class="popup-avatar">
                    <svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
                        <path d="M16 2C8.268 2 2 8.268 2 16c0 2.56.69 4.96 1.9 7.04L2.2 29.4a1.5 1.5 0 001.82 1.82l6.36-1.7A13.94 13.94 0 0016 30c7.732 0 14-6.268 14-14S23.732 2 16 2zm0 3a11 11 0 0111 11c0 2.72-.99 5.2-2.63 7.13l-.6.42-4.96 1.33a1.06 1.06 0 01-1.26-1.26l1.1-4.1A11 11 0 0116 5zM12.1 17.5l-.3.4a.5.5 0 00.1.6c.8.7 1.7 1.2 2.7 1.4l.5.1c.2.05.4 0 .55-.15l.6-.8a.45.45 0 00.2-.55l-.35-1a.5.5 0 00-.6-.35l-.55.2-1.1-1.1.2-.55a.5.5 0 00-.35-.65l-1-.2a.45.45 0 00-.55.2z"/>
                    </svg>
                </div>
                <div class="popup-info">
                    <h3>CRM Suporte</h3>
                    <span>Online agora</span>
                </div>
                <button class="popup-close" onclick="togglePopup()">&times;</button>
            </div>
            <div class="popup-body">
                <div class="chat-msg">
                    <p>Ola! 👋 Precisa de ajuda com o CRM? Fale conosco pelo WhatsApp!</p>
                    <div class="typing-dots">
                        <span></span>
                        <span></span>
                        <span></span>
                    </div>
                    <time>agora</time>
                </div>
            </div>
            <div class="popup-footer">
                <p>Atendimento rapido via Zap</p>
                <a href="https://wa.me/5517992118342?text=Ola!%20Vim%20pela%20extensao%20CRM." target="_blank" class="whatsapp-cta">
                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/>
                        <path d="M12 2C6.477 2 2 6.477 2 12c0 1.89.525 3.66 1.438 5.168L2 22l4.832-1.438A9.96 9.96 0 0012 22c5.523 0 10-4.477 10-10S17.523 2 12 2zm0 18a8 8 0 01-4.243-1.213l-.257-.153-2.87.853.853-2.87-.153-.257A8 8 0 1112 20z"/>
                    </svg>
                    Iniciar conversa
                </a>
            </div>
        </div>

        <div class="whatsapp-btn" id="whatsappBtn" role="button" tabindex="0" aria-label="WhatsApp">
            <div class="sparkles">
                <div class="sparkle"></div>
                <div class="sparkle"></div>
                <div class="sparkle"></div>
                <div class="sparkle"></div>
                <div class="sparkle"></div>
            </div>
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347zM12 2C6.477 2 2 6.477 2 12c0 1.89.525 3.66 1.438 5.168L2 22l4.832-1.438A9.96 9.96 0 0012 22c5.523 0 10-4.477 10-10S17.523 2 12 2zm0 18a8 8 0 01-4.243-1.213l-.257-.153-2.87.853.853-2.87-.153-.257A8 8 0 1112 20z"/>
            </svg>
            <div class="whatsapp-badge">1</div>
        </div>
    </div>

    <script>
        var isOpen = false;

        function togglePopup() {
            isOpen = !isOpen;
            document.getElementById('whatsappPopup').classList.toggle('active', isOpen);
        }

        document.addEventListener('DOMContentLoaded', function() {
            document.getElementById('whatsappBtn').addEventListener('click', function(e) {
                e.stopPropagation();
                togglePopup();
            });

            // Fechar ao clicar fora
            document.addEventListener('click', function(e) {
                var popup = document.getElementById('whatsappPopup');
                var btn = document.getElementById('whatsappBtn');
                if (isOpen && !popup.contains(e.target) && !btn.contains(e.target)) {
                    isOpen = false;
                    popup.classList.remove('active');
                }
            });
        });
    </script>
</body>
</html>
